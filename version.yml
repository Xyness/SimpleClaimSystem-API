# Version
version: 2.5.0

# Update date
date: 23/05/2026

# Update notes
update-notes:
# --- Main plugin ---
- "Fix: NPE in handleActionBar/handleChat/handleTitle when entering claims with a custom role — falls back to 'member' lang key when the role's own key isn't defined"
- "Fix: VaultUnlocked hook now works on Paper (plugin gate accepts either 'Vault' or 'VaultUnlocked' present; ServiceRegisterEvent listener picks up late registrations)"
- "Fix: Mace wind_burst enchantment now correctly respects WIND_CHARGE_EXPLOSIONS instead of falling through to the generic entity_explode flag"
- "Split: TELEPORT permission is now NATURAL_TELEPORT (ender pearl, chorus fruit, portals, end gateway) + OTHER_TELEPORT (plugin/command teleports). Existing claims auto-migrate; OTHER_TELEPORT also checked at the packet level for Folia"
- "New: /scs manage-claim [action] — admins can run every manage-claim action against the claim at their current location (flags, permissions, kick, ban, roleset, etc.) — same arg shape as /scs player <p> manage-claim <claim>"
- "New: /claim seenear [radius] — renders the borders of every nearby claim color-coded by ownership (green=yours, yellow=member, purple=parea, red=others). Radius capped by claims.seenear.max-radius"
- "New: /requnclaim [chunk|claim] [reason] — players can submit a staff-reviewed unclaim request; clickable [CONFIRM] flow with token validation, per-player quota + cooldown (both configurable), and an auto-resolve sweep that retires stale requests"
- "New: /viewrequnclaim — staff GUI listing pending unclaim requests. Left-click teleports, shift+right approves (force-unclaim), shift+left denies"
# --- API ---
- "API: new FlagDefinition / PermissionDefinition + SCS_FlagRegistry for declaring custom claim flags and role-permissions from external plugins. Data-only — register in your onLoad, gate behavior via your own EventHandlers using claim.getFlag(key) / claim.getPermission(role, key)"
- "API: registered custom keys are picked up by SCS's startup migration to seed defaults on existing claims; runtime registration backfills cached claims and persists to DB"
- "API: scs.bypass.<key>, scs.flag.<key>, scs.permission.<key> Bukkit permissions are auto-registered when a custom key is registered"
- "API: SCS_API.registerCustomFlag/unregisterCustomFlag/registerCustomPermission/unregisterCustomPermission exposed for runtime use too"
