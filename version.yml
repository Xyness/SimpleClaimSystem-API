# Version
version: 2.4.0

# Update date
date: 16/05/2026

# Update notes
update-notes:
- "Added public warp system: claims can be opened as public warps via /claim settings, visited through /claim visit <player> [claim] and listed with /claim warps"
- "Added /claim setvisitprice <amount> so owners can charge visitors a Vault fee per visit (paid to the owner, even when offline)"
- "Added /scs forceWarp <player> <claim> admin command and scs.admin.forcewarp permission to force-toggle a claim's public-warp flag"
- "Added new permissions: scs.claim.visit, scs.claim.warps, scs.claim.setvisitprice, scs.bypass.warp-cost"
- "Added ClaimWarpToggleEvent (cancellable): fired before a claim's public-warp flag flips"
- "Added ClaimVisitEvent (cancellable): fired before a player teleports via /claim visit, after ban/warp-closed checks and before payment/TP"
- "Fixed firework permission: use_firework now controls both right-click usage AND projectile launches (elytra boost). projectile_launch no longer blocks fireworks"